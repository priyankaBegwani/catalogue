name = "catalogue-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# R2 Bucket Binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ic-designs"

# Environment Variables
[vars]
VITE_SUPABASE_URL = ""
VITE_SUPABASE_ANON_KEY = ""

# Secrets (set via: wrangler secret put <NAME>)
# VITE_SUPABASE_SERVICE_KEY
# R2_PUBLIC_URL

# Development settings
[env.dev]
name = "catalogue-worker-dev"

# Production settings
[env.production]
name = "catalogue-worker-production"
